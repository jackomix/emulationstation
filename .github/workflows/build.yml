name: Build EmulationStation (R36S ARM64)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-r36s:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build in ARM64 Container
        run: |
          docker run --rm --privileged --platform linux/arm64 \
            -v ${{ github.workspace }}:/src \
            ubuntu:22.04 bash -c "
              export DEBIAN_FRONTEND=noninteractive &&
              apt-get update &&
              apt-get install -y --no-install-recommends \
                build-essential cmake git libsdl2-dev libsdl2-mixer-dev libfreeimage-dev \
                libfreetype6-dev libcurl4-openssl-dev rapidjson-dev \
                libasound2-dev libvlc-dev libvlccore-dev vlc-bin \
                libboost-all-dev libeigen3-dev \
                libgles2-mesa-dev libcec-dev libudev-dev gettext ca-certificates &&
              cd /src &&
              mkdir -p build &&
              cd build &&
              cmake \
                -DCMAKE_BUILD_TYPE=Release \
                -DGLES2=ON \
                -DENABLE_AMBERELEC=ON \
                -DRG351P=ON \
                .. &&
              make -j\$(nproc) &&
              cd /src &&
              strip emulationstation
            "

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build LAHEE Server
        run: |
          cd LAHEE-server
          dotnet publish ./LAHEE.csproj -c Release -r linux-arm64 --self-contained true -o ./publish
          cd ..

      - name: Package Release
        run: |
          mkdir -p release/RetroAchievements/Server
          mkdir -p release/RetroAchievements/Data
          mkdir -p release/RetroAchievements/Badges
          mkdir -p release/RetroAchievements/UserPic
          cp emulationstation release/
          cp -r LAHEE-server/publish/* release/RetroAchievements/Server/
          cp -r LAHEE-server/Web release/RetroAchievements/Server/
          # Ensure scripts are executable
          chmod +x release/emulationstation
          chmod +x release/RetroAchievements/Server/LAHEE

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: amber-es-lahee-unified-r36s
          path: release/
