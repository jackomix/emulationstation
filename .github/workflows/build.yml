name: Build EmulationStation (R36S ARM64)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-r36s:
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake git libsdl2-dev libsdl2-mixer-dev libfreeimage-dev \
            libfreetype6-dev libcurl4-openssl-dev rapidjson-dev \
            libasound2-dev libvlc-dev libvlccore-dev vlc-bin \
            libboost-all-dev libeigen3-dev \
            libgles2-mesa-dev libcec-dev libudev-dev gettext ca-certificates

      - name: Build
        run: |
          mkdir -p build
          cd build
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DGLES2=ON \
            -DENABLE_AMBERELEC=ON \
            -DRG351P=ON \
            ..
          make -j$(nproc)
          cd ..
          strip emulationstation

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: emulationstation-r36s
          path: emulationstation
