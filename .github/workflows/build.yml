name: Build EmulationStation (ARM64)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build in ARM64 Container
        run: |
          docker run --rm --privileged --platform linux/arm64 \
            -v ${{ github.workspace }}:/src \
            ubuntu:20.04 bash -c "
              export DEBIAN_FRONTEND=noninteractive &&
              apt-get update &&
              apt-get install -y \
                build-essential cmake git libsdl2-dev libfreeimage-dev \
                libfreetype6-dev libcurl4-openssl-dev rapidjson-dev \
                libasound2-dev libvlc-dev libvlccore-dev vlc-bin \
                libsdl2-mixer-dev libboost-all-dev libeigen3-dev \
                libgl1-mesa-dev libglu1-mesa-dev libcec-dev libudev-dev gettext &&
              cd /src &&
              mkdir -p build &&
              cd build &&
              cmake -DCMAKE_BUILD_TYPE=Release -DGLES2=ON -DENABLE_AMBERELEC=1 -DRG351P=1 .. &&
              make -j$(nproc) &&
              cd /src &&
              strip emulationstation
            "

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: emulationstation-arm64
          path: emulationstation
