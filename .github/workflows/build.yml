name: Build EmulationStation (R36S ARM64)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-r36s:
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake git libsdl2-dev libsdl2-mixer-dev libfreeimage-dev \
            libfreetype6-dev libcurl4-openssl-dev rapidjson-dev \
            libasound2-dev libvlc-dev libvlccore-dev vlc-bin \
            libboost-all-dev libeigen3-dev \
            libgles2-mesa-dev libcec-dev libudev-dev gettext ca-certificates

      - name: Build
        run: |
          mkdir -p build
          cd build
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DGLES2=ON \
            -DENABLE_AMBERELEC=ON \
            -DRG351P=ON \
            ..
          make -j$(nproc)
          cd ..
          strip emulationstation

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build LAHEE Server
        run: |
          cd LAHEE-server
          # Handheld version (Linux ARM64)
          dotnet publish ./LAHEE.csproj -c Release -r linux-arm64 --self-contained true -o ./publish
          # PC Scraper version (Windows x64)
          dotnet publish ./LAHEE.csproj -c Release -r win-x64 --self-contained true -o ./publish-win
          cd ..

      - name: Package Release
        run: |
          mkdir -p release/RetroAchievements/Server
          mkdir -p release/RetroAchievements/Data
          mkdir -p release/RetroAchievements/Badges
          mkdir -p release/RetroAchievements/UserPic
          cp emulationstation release/
          # Copy Handheld files
          cp -r LAHEE-server/publish/* release/RetroAchievements/Server/
          # Copy PC binary (for the scraper script)
          cp LAHEE-server/publish-win/LAHEE.exe release/RetroAchievements/Server/
          
          cp -r LAHEE-server/Web release/RetroAchievements/Server/
          cp LAHEE-server/lahee_startup.sh release/RetroAchievements/Server/
          cp LAHEE-server/ScrapeAchievements.ps1 release/RetroAchievements/
          chmod +x release/RetroAchievements/Server/lahee_startup.sh
          # Ensure scripts are executable
          chmod +x release/emulationstation
          chmod +x release/RetroAchievements/Server/LAHEE

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: amber-es-lahee-unified-r36s
          path: release/
