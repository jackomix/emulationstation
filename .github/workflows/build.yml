name: Build EmulationStation (R36S ARM64)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-r36s:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build in ARM64 Container
        run: |
          docker run --rm --privileged --platform linux/arm64 \
            -v ${{ github.workspace }}:/src \
            ubuntu:22.04 bash -c "
              export DEBIAN_FRONTEND=noninteractive &&
              apt-get update &&
              apt-get install -y \
                build-essential cmake git libsdl2-dev libfreeimage-dev \
                libfreetype6-dev libcurl4-openssl-dev rapidjson-dev \
                libasound2-dev libvlc-dev libvlccore-dev vlc-bin \
                libsdl2-mixer-dev libboost-all-dev libeigen3-dev \
                libgles-dev libcec-dev libudev-dev gettext &&
              cd /src &&
              mkdir -p build &&
              cd build &&
              cmake \
                -DCMAKE_BUILD_TYPE=Release \
                -DGLES2=ON \
                -DGLES=OFF \
                -DGL=OFF \
                -DENABLE_AMBERELEC=ON \
                -DRG351P=ON \
                -DOPENGLES2_INCLUDE_DIR=/usr/include \
                .. &&
              make -j$(nproc) &&
              cd /src &&
              strip emulationstation
            "

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: emulationstation-r36s
          path: emulationstation
